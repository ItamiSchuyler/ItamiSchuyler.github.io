      /* WALLPAPER */
      #wallpaper-container {
        position: fixed;
        inset: 0;
        z-index: -3;
      }

      .wallpaper-layer {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        opacity: 0;
        transition: opacity .8s ease;
      }

      .wallpaper-layer.active {
        opacity: 1;
      }

      #particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -2;
      }

      /* BLUR */
      #blur-layer {
        position: fixed;
        inset: 0;
        backdrop-filter: blur(12px);
        background: rgba(0, 0, 0, .25);
        opacity: 0;
        transition: .3s;
        z-index: 5;
        pointer-events: none;
      }

      #blur-layer.active {
        opacity: 1
      }

      /* DESKTOP */
      #desktop {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 20px
      }

      /* FOLDERS */
      .folder {
        width: 100px;

        cursor: pointer;

        padding: 10px;

 top:120px;
left:120px;
transform:none;

    .glitch {
  position: relative;
  font-size: 46px;
  font-weight: 800;
  letter-spacing: 4px;
  color: white;
  animation: glitchBase 4s infinite;
}

/* Capas glitch */
.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  overflow: hidden;
  opacity: .6;
}

/* Rojo */
.glitch::before {
  color: #ff4d4d;
  z-index: -1;
  animation: glitchTop 4s infinite;
}

/* Azul */
.glitch::after {
  color: #4da6ff;
  z-index: -2;
  animation: glitchBottom 4s infinite;
}

/* Movimiento leve base */
@keyframes glitchBase {
  0%, 94%, 100% { transform: none; }
  95% { transform: translate(1px, -1px); }
  96% { transform: translate(-1px, 1px); }
  97% { transform: translate(1px, 0px); }
  98% { transform: translate(-1px, 0px); }
  99% { transform: none; }
}

/* Desfase rojo */
@keyframes glitchTop {
  0%, 94%, 100% { transform: none; }
  96% { transform: translate(-2px, -1px); }
  98% { transform: translate(2px, 1px); }
}

/* Desfase azul */
@keyframes glitchBottom {
  0%, 94%, 100% { transform: none; }
  95% { transform: translate(2px, 1px); }
  97% { transform: translate(-2px, -1px); }
}

let z=10;

window.openWin = function(id){

  const win = document.getElementById(id);
  if(!win) return;

  win.style.display = "block";
  win.style.zIndex = ++z;

  requestAnimationFrame(()=>{

    const w = win.offsetWidth;
    const h = win.offsetHeight;

    win.style.left = (window.innerWidth/2 - w/2) + "px";
    win.style.top  = (window.innerHeight/2 - h/2) + "px";

  });

  addToTaskbar(id);

  document.getElementById("blur-layer").classList.add("active");

}

window.closeWin = function(id){
  document.getElementById(id).style.display="none";
  removeFromTaskbar(id);

  const algunaAbierta=[...document.querySelectorAll(".window")]
    .some(w=>w.style.display==="block");

  document.getElementById("blur-layer")
    .classList.toggle("active",algunaAbierta);
}

  function addToTaskbar(id){
  if(document.querySelector(`.task-item[data-id="${id}"]`)) return;

  const task=document.createElement("div");
  task.className="task-item active";
  task.dataset.id=id;

  const title=document.querySelector(`#${id} .titlebar`).childNodes[0].textContent.trim();
  task.textContent=title;

  task.onclick=()=>{
    const win=document.getElementById(id);

    if(win.style.display==="block"){
      win.style.display="none";
      task.classList.remove("active");
    }else{
      win.style.display="block";
      win.style.zIndex=++z;
      task.classList.add("active");
    }
  };

  document.getElementById("taskApps").appendChild(task);
}

function removeFromTaskbar(id){
  const task=document.querySelector(`.task-item[data-id="${id}"]`);
  if(task) task.remove();
}

function makeDraggable(win){
  const bar = win.querySelector(".titlebar");
  let offsetX = 0;
  let offsetY = 0;
  let dragging = false;

  bar.addEventListener("mousedown", e => {
    dragging = true;

    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;

    win.style.zIndex = ++z;
  });

  document.addEventListener("mousemove", e => {
    if(!dragging) return;

    win.style.left = (e.clientX - offsetX) + "px";
    win.style.top  = (e.clientY - offsetY) + "px";
  });

  document.addEventListener("mouseup", () => {
    dragging = false;
  });
}

const audio = document.getElementById("audio");
const play = document.getElementById("play");
const bar = document.getElementById("bar");
const waveBars = document.querySelectorAll(".wave-bar");

let current = 0;
let audioContext, analyser, source, dataArray;

function loadTrack(i){
  current = i;
  audio.src = tracks[i].src;
  bar.style.width = "0%";
}

loadTrack(0);

// 🔊 Setup audio analyser
function setupAudio(){
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioContext.createAnalyser();
  source = audioContext.createMediaElementSource(audio);

  source.connect(analyser);
  analyser.connect(audioContext.destination);

  analyser.fftSize = 64;
  const bufferLength = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufferLength);

  animateWave();
}

play.onclick = async () => {

  if(!audioContext) setupAudio();

  if(audioContext.state === "suspended"){
    await audioContext.resume();
  }

  if(audio.paused){
    audio.play();
    play.textContent = "⏸";
  }else{
    audio.pause();
    play.textContent = "▶";
  }
};

audio.ontimeupdate = () => {
  if(audio.duration){
    bar.style.width = (audio.currentTime / audio.duration * 100) + "%";
  }
};

audio.onended = () => {
  current = (current + 1) % tracks.length;
  loadTrack(current);
  audio.play();
};

// 🎵 Real visualizer
function animateWave(){
  requestAnimationFrame(animateWave);

  analyser.getByteFrequencyData(dataArray);

  waveBars.forEach((barEl, i) => {
    const value = dataArray[i * 2];
    const height = Math.max(4, value / 6);
    barEl.style.height = height + "px";
    barEl.style.opacity = value > 40 ? 1 : 0.4;
  });
}

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

const mouse={x:null,y:null};
window.addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

const particles=[];
for(let i=0;i<90;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.6,
    vy:(Math.random()-0.5)*0.6,
    r:Math.random()*2+1
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;

    if(mouse.x){
      const dx=p.x-mouse.x;
      const dy=p.y-mouse.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        const force=(120-dist)/120;
        p.x+=dx*force*0.02;
        p.y+=dy*force*0.02;
      }
    }

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,.6)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

////////////////////////////
// WALLPAPERS
////////////////////////////

const wallpapers=[
  "https://i.ibb.co/S4wLCz9M/1399771.png",
  "https://i.ibb.co/Mk7tsD8f/1400584.png",
  "https://i.ibb.co/HyZHc46/1271005.png"
];

const layers=document.querySelectorAll(".wallpaper-layer");
const selector=document.getElementById("wallSelector");

let currentWall=Number(localStorage.getItem("wall"))||0;
let activeLayer=0;

layers[activeLayer].style.backgroundImage=`url(${wallpapers[currentWall]})`;
layers[activeLayer].classList.add("active");

wallpapers.forEach((src,i)=>{
  const thumb=document.createElement("div");
  thumb.className="wall-thumb";
  thumb.style.backgroundImage=`url(${src})`;

  thumb.onclick=()=>{
    localStorage.setItem("wall",i);
    const next=activeLayer?0:1;
    layers[next].style.backgroundImage=`url(${src})`;
    layers[next].classList.add("active");
    layers[activeLayer].classList.remove("active");
    activeLayer=next;
  };

  selector.appendChild(thumb);
});

});
